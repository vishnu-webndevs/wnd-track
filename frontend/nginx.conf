server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React/Vue/Angular routing ke liye
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests ko backend pe forward karne ke liye
    # NOTE: API_UPSTREAM env variable set karna zaroori hai (example: http://<backend-host>:8080)
    location /api {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /track_app {
        return 302 /track_app/TrackerWebndevs.exe;
    }

    location = /track_app/TrackerWebndevs.exe {
        alias /usr/share/nginx/html/track_app/TrackerWebndevs.exe;
        add_header Content-Disposition "attachment; filename=TrackerWebndevs.exe" always;
        add_header Cache-Control "no-store" always;
    }

    # Storage images ko backend se serve karne ke liye
    location ^~ /storage/ {
        proxy_pass ${API_UPSTREAM};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
