server {
    listen ${NGINX_LISTEN_PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React/Vue/Angular routing ke liye
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API requests ko backend container pe bhejne ke liye
    location /api {
        proxy_ssl_server_name on;
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /track_app {
        return 302 /track_app/TrackerWebndevs.exe;
    }

    location = /track_app/TrackerWebndevs.exe {
        alias /usr/share/nginx/html/track_app/TrackerWebndevs.exe;
        add_header Content-Disposition "attachment; filename=TrackerWebndevs.exe" always;
        add_header Cache-Control "no-store" always;
    }

    # Storage images ko backend container se serve karne ke liye
    location ^~ /storage/ {
        proxy_ssl_server_name on;
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
