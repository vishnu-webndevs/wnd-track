server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React/Vue/Angular routing ke liye
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /track_app {
        return 302 /track_app/TrackerWebndevs.exe;
    }

    location = /track_app/TrackerWebndevs.exe {
        alias /usr/share/nginx/html/track_app/TrackerWebndevs.exe;
        add_header Content-Disposition "attachment; filename=TrackerWebndevs.exe" always;
        add_header Cache-Control "no-store" always;
    }
}
